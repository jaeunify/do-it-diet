<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마운자로 구간별 가속도 예측기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="localdata.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #fd79a8;
            --fat: #e17055;
            --muscle: #00b894;
            --bg: #f9f9fb;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #2d3436;
        }
        .card {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        h2, h3 { margin: 0 0 16px; }

        /* Tab bar */
        .tab-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            border-bottom: 2px solid #eee;
            padding-bottom: 0;
        }
        .tab-btn {
            padding: 8px 18px;
            border: none;
            background: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.88em;
            color: #b2bec3;
            position: relative;
            bottom: -2px;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .tab-btn:hover { color: #636e72; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: none; }
        .tab-btn.fat-tab.active { color: var(--fat); border-bottom-color: var(--fat); }
        .tab-btn.muscle-tab.active { color: var(--muscle); border-bottom-color: var(--muscle); }

        /* Prediction control */
        .predict-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .predict-control label { font-size: 0.88em; font-weight: bold; color: #636e72; }
        .predict-control input[type=number] {
            width: 72px;
            padding: 7px 10px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 0.9em;
        }
        .calc-btn {
            padding: 7px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.88em;
        }

        /* Prediction info boxes */
        .prediction-info {
            padding: 12px 16px;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            margin-bottom: 14px;
            font-size: 0.92em;
            background: #edf2ff;
            line-height: 1.7;
        }
        .prediction-info.fat { background: #fff3f0; border-left-color: var(--fat); }
        .prediction-info.muscle { background: #effffa; border-left-color: var(--muscle); }

        /* Input sections */
        .input-panel { display: none; }
        .input-panel.active { display: block; }
        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            background: #f1f2f6;
            padding: 14px;
            border-radius: 12px;
        }
        input[type=date], input[type=number], select {
            padding: 9px 10px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-size: 0.88em;
            width: 100%;
        }
        .add-btn {
            padding: 9px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.88em;
        }
        .add-btn.fat-btn { background: var(--fat); }

        /* Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.83em; margin-top: 16px; }
        th { padding: 10px 8px; background: #f8f9fa; font-size: 0.82em; color: #636e72; text-transform: uppercase; letter-spacing: 0.03em; }
        td { padding: 9px 8px; border-bottom: 1px solid #f1f2f6; text-align: center; }
        .dose-badge { padding: 2px 8px; border-radius: 15px; font-size: 0.75em; color: white; font-weight: bold; }
        .del-btn { background: #ffeaa7; color: #e17055; border: none; border-radius: 6px; padding: 2px 8px; cursor: pointer; font-weight: bold; }

        /* Chart panel */
        .chart-panel { display: none; }
        .chart-panel.active { display: block; }
    </style>
</head>
<body>

<!-- ── 차트 카드 ── -->
<div class="card">
    <h2>💉 마운자로 구간별 가속도 예측기 (V5)</h2>

    <div class="predict-control">
        <label>예측 기간</label>
        <input type="number" id="predict-days" value="7" min="1" max="180">
        <span style="font-size:0.88em; color:#636e72;">일 뒤</span>
        <button class="calc-btn" onclick="updateAll()">계산</button>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchChartTab('weight', this)">체중</button>
        <button class="tab-btn fat-tab" onclick="switchChartTab('fat', this)">체지방량</button>
        <button class="tab-btn muscle-tab" onclick="switchChartTab('muscle', this)">골격근량</button>
    </div>

    <div id="chart-panel-weight" class="chart-panel active">
        <div id="status-weight" class="prediction-info">데이터를 불러오는 중...</div>
        <canvas id="chart-weight" height="130"></canvas>
    </div>
    <div id="chart-panel-fat" class="chart-panel">
        <div id="status-fat" class="prediction-info fat">데이터를 불러오는 중...</div>
        <canvas id="chart-fat" height="130"></canvas>
    </div>
    <div id="chart-panel-muscle" class="chart-panel">
        <div id="status-muscle" class="prediction-info muscle">데이터를 불러오는 중...</div>
        <canvas id="chart-muscle" height="130"></canvas>
    </div>
</div>

<!-- ── 입력 카드 ── -->
<div class="card">
    <h3>➕ 데이터 입력</h3>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchInputTab('inbody', this)">인바디 입력</button>
        <button class="tab-btn fat-tab" onclick="switchInputTab('dose', this)">투약 입력</button>
    </div>

    <div id="input-panel-inbody" class="input-panel active">
        <div class="input-row">
            <input type="date" id="ib-date">
            <input type="number" id="ib-weight" step="0.1" placeholder="체중 (kg)">
            <input type="number" id="ib-fat" step="0.1" placeholder="체지방 (kg)">
            <input type="number" id="ib-muscle" step="0.1" placeholder="골격근량 (kg)">
            <button class="add-btn" onclick="addInbody()">기록 추가</button>
        </div>
    </div>

    <div id="input-panel-dose" class="input-panel">
        <div class="input-row">
            <input type="date" id="dose-date">
            <select id="dose-val">
                <option value="2.5">2.5mg</option>
                <option value="5.0" selected>5.0mg</option>
                <option value="7.5">7.5mg</option>
                <option value="10.0">10.0mg</option>
                <option value="12.5">12.5mg</option>
                <option value="15.0">15.0mg</option>
            </select>
            <button class="add-btn fat-btn" onclick="addDose()">투약 추가</button>
        </div>
    </div>

    <!-- 통합 테이블 -->
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>투약</th>
                    <th>체중</th>
                    <th style="color:var(--fat)">체지방</th>
                    <th style="color:var(--muscle)">골격근량</th>
                    <th>삭제</th>
                </tr>
            </thead>
            <tbody id="data-list"></tbody>
        </table>
    </div>
</div>

<script>
    const loaded = (typeof localData !== 'undefined') ? localData : { inbody: [], dose: [] };
    let inbodyData = loaded.inbody.map(r => ({ ...r }));
    let doseData   = loaded.dose.map(r => ({ ...r }));

    let charts = { weight: null, fat: null, muscle: null };

    // ── 탭 전환 ──
    function switchChartTab(type, btn) {
        document.querySelectorAll('#chart-panel-weight, #chart-panel-fat, #chart-panel-muscle')
            .forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-bar').item(0).querySelectorAll('.tab-btn')
            .forEach(b => b.classList.remove('active'));
        document.getElementById('chart-panel-' + type).classList.add('active');
        btn.classList.add('active');
    }

    function switchInputTab(type, btn) {
        document.querySelectorAll('#input-panel-inbody, #input-panel-dose')
            .forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-bar').item(1).querySelectorAll('.tab-btn')
            .forEach(b => b.classList.remove('active'));
        document.getElementById('input-panel-' + type).classList.add('active');
        btn.classList.add('active');
    }

    // ── 데이터 추가 ──
    function addInbody() {
        const date   = document.getElementById('ib-date').value;
        const weight = parseFloat(document.getElementById('ib-weight').value);
        const fat    = parseFloat(document.getElementById('ib-fat').value);
        const muscle = parseFloat(document.getElementById('ib-muscle').value);
        if (!date || isNaN(weight)) return alert('날짜와 체중은 필수입니다!');
        const existing = inbodyData.find(r => r.date === date);
        if (existing) {
            existing.weight = weight;
            if (!isNaN(fat))    existing.fat = fat;
            if (!isNaN(muscle)) existing.muscle = muscle;
        } else {
            inbodyData.push({ date, weight, fat: isNaN(fat) ? null : fat, muscle: isNaN(muscle) ? null : muscle });
            inbodyData.sort((a, b) => a.date.localeCompare(b.date));
        }
        updateAll();
    }

    function addDose() {
        const date = document.getElementById('dose-date').value;
        const dose = parseFloat(document.getElementById('dose-val').value);
        if (!date) return alert('날짜를 입력하세요!');
        const existing = doseData.find(r => r.date === date);
        if (existing) existing.dose = dose;
        else {
            doseData.push({ date, dose });
            doseData.sort((a, b) => a.date.localeCompare(b.date));
        }
        updateAll();
    }

    function removeRow(date) {
        inbodyData = inbodyData.filter(r => r.date !== date);
        doseData   = doseData.filter(r => r.date !== date);
        updateAll();
    }

    // ── 활성 용량 조회 ──
    function getActiveDose(date) {
        const prior = doseData.filter(r => r.date <= date);
        return prior.length ? prior[prior.length - 1].dose : null;
    }

    // ── 테이블 렌더 ──
    function renderTable() {
        // 날짜 union
        const dates = [...new Set([
            ...inbodyData.map(r => r.date),
            ...doseData.map(r => r.date)
        ])].sort();

        const tbody = document.getElementById('data-list');
        tbody.innerHTML = '';
        dates.forEach(date => {
            const ib   = inbodyData.find(r => r.date === date);
            const dose = getActiveDose(date);
            const doseChanged = doseData.some(r => r.date === date);
            const color = dose >= 5 ? '#9966FF' : dose ? '#4BC0C0' : '#b2bec3';
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td>${dose != null
                        ? `<span class="dose-badge" style="background:${color}">${dose}mg${doseChanged ? ' ★' : ''}</span>`
                        : '-'}</td>
                    <td style="font-weight:bold">${ib ? ib.weight + 'kg' : '-'}</td>
                    <td style="color:var(--fat)">${ib?.fat != null ? ib.fat + 'kg' : '-'}</td>
                    <td style="color:var(--muscle)">${ib?.muscle != null ? ib.muscle + 'kg' : '-'}</td>
                    <td><button class="del-btn" onclick="removeRow('${date}')">X</button></td>
                </tr>`;
        });
    }

    // ── 예측 로직 (4차 다항회귀) ──
    function calcPrediction(group, field, predictDays) {
        const vals = group.map(r => ({ t: r.t, v: r[field] })).filter(r => r.v != null);
        if (vals.length < 2) return null; // 1차는 최소 2개

        const degree = 1;

        // 수치 안정성을 위해 t 정규화 [0, 1]
        const tMin = vals[0].t;
        const tMax = vals[vals.length - 1].t;
        const tRange = tMax - tMin || 1;
        const tNorm  = vals.map(r => (r.t - tMin) / tRange);
        const tPred  = (vals[vals.length - 1].t + predictDays - tMin) / tRange;
        const Y      = vals.map(r => r.v);

        const coeffs = polyRegression(tNorm, Y, degree);
        if (!coeffs) return null;

        let pred = evalPoly(coeffs, tPred);
        if (field === 'weight' && pred < vals[vals.length - 1].v - 2.5 * predictDays / 7)
            pred = vals[vals.length - 1].v - 2.5 * predictDays / 7;

        // 임의의 raw t(경과일)를 정규화해서 다항식 평가
        const evalAt = rawT => evalPoly(coeffs, (rawT - tMin) / tRange);

        return { pred: parseFloat(pred.toFixed(1)), degree, evalAt, lastRawT: vals[vals.length - 1].t };
    }

    // 최소제곱법 다항회귀
    function polyRegression(X, Y, degree) {
        const d = degree + 1;
        const A = Array.from({ length: d }, () => new Array(d).fill(0));
        const b = new Array(d).fill(0);
        for (let i = 0; i < d; i++) {
            for (let j = 0; j < d; j++)
                for (let k = 0; k < X.length; k++)
                    A[i][j] += Math.pow(X[k], i + j);
            for (let k = 0; k < X.length; k++)
                b[i] += Y[k] * Math.pow(X[k], i);
        }
        return gaussianElim(A, b);
    }

    // 가우스 소거법
    function gaussianElim(A, b) {
        const n = b.length;
        const M = A.map((row, i) => [...row, b[i]]);
        for (let col = 0; col < n; col++) {
            let maxRow = col;
            for (let row = col + 1; row < n; row++)
                if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
            [M[col], M[maxRow]] = [M[maxRow], M[col]];
            if (Math.abs(M[col][col]) < 1e-12) return null;
            for (let row = 0; row < n; row++) {
                if (row === col) continue;
                const f = M[row][col] / M[col][col];
                for (let k = col; k <= n; k++) M[row][k] -= f * M[col][k];
            }
        }
        return M.map((row, i) => row[n] / row[i]);
    }

    function evalPoly(coeffs, t) {
        return coeffs.reduce((sum, c, i) => sum + c * Math.pow(t, i), 0);
    }

    function buildGroups() {
        // inbodyData에 dose 붙여서 그룹화
        const rows = inbodyData.map((r, i) => ({
            ...r,
            dose: getActiveDose(r.date),
            t: (new Date(r.date) - new Date(inbodyData[0].date)) / 86400000
        }));
        const groups = [];
        let cur = [];
        rows.forEach((r, i) => {
            if (i > 0 && r.dose !== rows[i-1].dose) { groups.push(cur); cur = []; }
            cur.push(r);
        });
        groups.push(cur);
        return groups;
    }

    // 구간별 선형회귀 피팅
    function fitGroup(group, field) {
        const vals = group.map(r => ({ t: r.t, v: r[field] })).filter(r => r.v != null);
        if (vals.length < 2) return null;
        const tMin = vals[0].t, tMax = vals[vals.length - 1].t;
        const tRange = tMax - tMin || 1;
        const coeffs = polyRegression(vals.map(r => (r.t - tMin) / tRange), vals.map(r => r.v), 1);
        if (!coeffs) return null;
        return {
            evalAt: rawT => evalPoly(coeffs, (rawT - tMin) / tRange),
            startT: vals[0].t,
            endT:   vals[vals.length - 1].t
        };
    }

    // ── 차트 렌더 ──
    function renderSingleChart(field, canvasId, statusId, color, label, unit) {
        const predictDays = parseInt(document.getElementById('predict-days').value) || 7;
        if (inbodyData.length === 0) return;

        const groups = buildGroups();
        const lastGroup = groups[groups.length - 1];
        const result = calcPrediction(lastGroup, field, predictDays);

        const baseDate = new Date(inbodyData[0].date);
        const toDay = date => (new Date(date) - baseDate) / 86400000;
        const fmtDay = d => {
            const dt = new Date(baseDate.getTime() + d * 86400000);
            return `${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
        };

        const points = inbodyData.map(r => ({
            x: toDay(r.date),
            y: r[field] ?? null
        }));

        const dose = getActiveDose(inbodyData[inbodyData.length - 1]?.date);

        // 구간별 회귀선 데이터셋 생성
        const regressionDatasets = groups.map((group, gi) => {
            const fit = fitGroup(group, field);
            if (!fit) return null;
            const isLast = gi === groups.length - 1;
            // 끊김 방지: 다음 구간의 시작 t까지 연장
            const nextStartT = !isLast
                ? groups[gi + 1].find(r => r[field] != null)?.t ?? fit.endT
                : null;
            const endT = isLast ? fit.endT + predictDays : nextStartT;
            const steps = 60;
            const linePoints = [];
            for (let i = 0; i <= steps; i++) {
                const rawT = fit.startT + (endT - fit.startT) * i / steps;
                linePoints.push({ x: rawT, y: parseFloat(fit.evalAt(rawT).toFixed(2)) });
            }
            // 시작점 · 끝점에만 점 표시
            const pointRadii = linePoints.map((_, i) => (i === 0 || i === steps) ? 5 : 0);
            return {
                label: `회귀선 ${gi+1}`,
                data: linePoints,
                borderColor: '#f9ca24',
                backgroundColor: 'transparent',
                borderWidth: 2,
                borderDash: [6, 4],
                pointRadius: pointRadii,
                pointBackgroundColor: '#f9ca24',
                fill: false,
                tension: 0,
                order: 0
            };
        }).filter(Boolean);

        if (result) {
            document.getElementById(statusId).innerHTML =
                `현재 <b>${dose != null ? dose + 'mg' : '-'}</b> 구간 · ${predictDays}일 뒤 예상 ${label}: ` +
                `<b style="color:${color}">${result.pred}${unit}</b>` +
                `<br><small style="color:#888">${result.degree}차 회귀 (데이터 ${lastGroup.filter(r => r[field] != null).length}개)</small>`;
        } else {
            document.getElementById(statusId).innerHTML = '현재 용량 구간 데이터 2개 이상 필요합니다.';
        }

        if (charts[field]) charts[field].destroy();
        const ctx = document.getElementById(canvasId).getContext('2d');
        charts[field] = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label,
                        data: points,
                        borderColor: color,
                        backgroundColor: color + '18',
                        borderWidth: 3,
                        pointBackgroundColor: color,
                        pointRadius: 5,
                        tension: 0.3,
                        fill: true,
                        spanGaps: true,
                        order: 1
                    },
                    ...regressionDatasets
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                doseLinesData: doseData.map((d, i) => ({
                    x: toDay(d.date),
                    label: d.dose + 'mg',
                    showLabel: i === 0 || d.dose !== doseData[i - 1].dose
                })),
                scales: {
                    x: {
                        type: 'linear',
                        ticks: { callback: d => fmtDay(d) }
                    },
                    y: {
                        ticks: { callback: v => v + unit }
                    }
                }
            }
        });
    }

    // ── 투약 세로선 커스텀 플러그인 ──
    const doseLinesPlugin = {
        id: 'doseLines',
        afterDraw(chart) {
            const lines = chart.config.options.doseLinesData;
            if (!lines || !lines.length) return;
            const { ctx, chartArea, scales } = chart;
            ctx.save();
            lines.forEach(({ x, label, showLabel }) => {
                const px = scales.x.getPixelForValue(x);
                if (px < chartArea.left || px > chartArea.right) return;
                // 세로선
                ctx.beginPath();
                ctx.setLineDash([5, 4]);
                ctx.strokeStyle = 'rgba(253, 121, 168, 0.7)';
                ctx.lineWidth = 1.5;
                ctx.moveTo(px, chartArea.top);
                ctx.lineTo(px, chartArea.bottom);
                ctx.stroke();
                // 용량 레이블 — 첫날(dose 변경 시)만 표시
                if (showLabel) {
                    ctx.setLineDash([]);
                    ctx.font = 'bold 10px sans-serif';
                    const tw = ctx.measureText(label).width;
                    ctx.fillStyle = 'rgba(253, 121, 168, 0.15)';
                    ctx.fillRect(px - tw / 2 - 4, chartArea.top + 4, tw + 8, 16);
                    ctx.fillStyle = '#d63031';
                    ctx.textAlign = 'center';
                    ctx.fillText(label, px, chartArea.top + 15);
                }
            });
            ctx.restore();
        }
    };
    Chart.register(doseLinesPlugin);

    function updateAll() {
        renderTable();
        renderSingleChart('weight', 'chart-weight', 'status-weight', '#6c5ce7', '체중', 'kg');
        renderSingleChart('fat',    'chart-fat',    'status-fat',    '#e17055', '체지방량', 'kg');
        renderSingleChart('muscle', 'chart-muscle', 'status-muscle', '#00b894', '골격근량', 'kg');
    }

    window.onload = updateAll;
</script>

</body>
</html>
